# Local infra for development.
# Postgres is your primary store; we start on vanilla Postgres (which you already know)
# and you'll push it to its limits before deciding whether TimescaleDB / ClickHouse earn their place.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
